Hydejack Custom Head
<!-- MathJax for rendering math equations -->
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script>
    window.MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']],
            processEscapes: true,
            processEnvironments: true
        },
        options: {
            skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
        }
    };
</script>

<style>
    /* GitHub Style Alerts for Hydejack */
    /* We target blockquotes with specific classes applied by kramdown */
    blockquote.note,
    blockquote.warning,
    blockquote.danger,
    blockquote.important,
    blockquote.tip,
    .note,
    .warning,
    .danger,
    .important,
    .tip {
        padding: 1rem 1.25rem !important;
        margin: 1.5rem 0 !important;
        border-left: 0.25rem solid !important;
        border-radius: 0.4rem !important;
        font-size: 0.95rem !important;
        line-height: 1.6 !important;
        border-right: none !important;
        border-top: none !important;
        border-bottom: none !important;
        opacity: 1 !important;
        color: #24292f !important;
        /* GitHub dark text */
    }

    .note {
        border-left-color: #0969da !important;
        background-color: #f6f8fa !important;
    }

    .note::before {
        content: "Note" !important;
        color: #0969da !important;
        font-weight: 600 !important;
        display: block !important;
        margin-bottom: 0.25rem !important;
        position: static !important;
        top: auto !important;
        left: auto !important;
        transform: none !important;
    }

    .warning {
        border-left-color: #9a6700 !important;
        background-color: #fff8c5 !important;
    }

    .warning::before {
        content: "Warning" !important;
        color: #9a6700 !important;
        font-weight: 600 !important;
        display: block !important;
        margin-bottom: 0.25rem !important;
        position: static !important;
        top: auto !important;
        left: auto !important;
        transform: none !important;
    }

    .danger,
    .important {
        border-left-color: #cf222e !important;
        background-color: #ffebe9 !important;
    }

    .danger::before,
    .important::before {
        content: "Important" !important;
        color: #cf222e !important;
        font-weight: 600 !important;
        display: block !important;
        margin-bottom: 0.25rem !important;
        position: static !important;
        top: auto !important;
        left: auto !important;
        transform: none !important;
    }

    /* Override Hydejack's default blockquote style when these classes are present */
    blockquote.note p,
    blockquote.warning p,
    blockquote.danger p {
        margin: 0 !important;
    }
</style>
